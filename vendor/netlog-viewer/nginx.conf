server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck for lazycat health_check.test_url
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # All assets — no SPA fallback (this site serves real files only).
    location / {
        try_files $uri $uri/ =404;
    }

    # Static assets: long cache. The upstream filenames don't carry hashes,
    # but updates only happen on a new image build (= new lpk install), so a
    # day of caching is safe and cheap.
    location ~* \.(?:js|css|html|png|svg|woff2?|ttf)$ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Tighter security defaults — the app only needs to load same-origin
    # assets and inline-evaluate Polymer-generated code.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # NetLog files can be huge (100s of MB). The user uploads them through a
    # client-side file picker so they never hit nginx, but tighten the
    # request limits anyway since this isn't an upload endpoint.
    client_max_body_size 1m;

    # Don't log every static asset hit — logs add up fast on a debugging tool.
    access_log off;
}
